name: Build VST3 Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libasound2-dev

    - name: Download and Setup VST3 SDK
      run: |
        # Define the VST3 SDK version or commit hash you want to use
        # This is an example, check Steinberg's GitHub for the latest stable release
        VST3_SDK_VERSION="3.7.11" # Or a specific commit hash
                SDK_ARCHIVE="VST_SDK_${VST3_SDK_VERSION}_build_11_11_2023.zip" # Correct name for 3.7.11, adjust for other versions
        SDK_URL="https://github.com/steinbergmedia/vst3sdk/releases/download/${VST3_SDK_VERSION}/${SDK_ARCHIVE}"

        # Create a directory for the SDK
        mkdir -p ${{ github.workspace }}/vst3sdk
        cd ${{ github.workspace }}/vst3sdk

        # Download the SDK
        echo "Downloading VST3 SDK from: ${SDK_URL}"
        curl -L "${SDK_URL}" -o "${SDK_ARCHIVE}"

        # Unzip the SDK
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          7z x "${SDK_ARCHIVE}" -o.
        else
          unzip "${SDK_ARCHIVE}"
        fi
        
        # Determine the actual SDK root directory after extraction
        # It's usually named 'VST3 SDK' or similar
        SDK_ROOT_DIR=$(find . -maxdepth 2 -type d -name "*VST3 SDK*" -print -quit || find . -maxdepth 2 -type d -name "*vst3sdk*" -print -quit || echo ".")
        echo "Detected VST3 SDK root: ${SDK_ROOT_DIR}"

        # Set the VST3_SDK_PATH environment variable for subsequent steps
        echo "VST3_SDK_PATH=${{ github.workspace }}/vst3sdk/${SDK_ROOT_DIR}" >> $GITHUB_ENV
      shell: bash

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release \
                 -DVST3_SDK_PATH="${{ env.VST3_SDK_PATH }}" \
                 ${{ runner.os == 'Windows' && '-G "Visual Studio 17 2022"' || '' }} \
                 ${{ runner.os == 'macOS' && '-G "Xcode"' || '' }}
      shell: bash

    - name: Build Plugin
      run: |
        cd build
        cmake --build . --config Release
      shell: bash

    - name: Upload VST3 Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: DeBreathalyzer-Windows
        path: build/VST3/DeBreathalyzer.vst3

    - name: Upload VST3 Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: DeBreathalyzer-macOS
        path: build/VST3/DeBreathalyzer.vst3

    - name: Upload VST3 Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: DeBreathalyzer-Linux
        path: build/VST3/DeBreathalyzer.vst3